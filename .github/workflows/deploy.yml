name: Deploy to Namecheap

on:
  push:
    branches:
      - main
    paths:
      # Only deploy when published web assets actually change. Docs-only
      # commits (README, methodology, etc.) skip the round-trip.
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Force any JS action that still declares node20 to run on node24.
    # GitHub is making this the default on 2026-06-02; setting it now
    # silences the deprecation warning and future-proofs the workflow.
    # Can be dropped once SamKirkland/FTP-Deploy-Action publishes a
    # release that declares `using: "node24"`.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy web/ to Namecheap via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./web/
          # FTP_USERNAME is chrooted to the subdomain's document root
          # (/home/tramnqes/climate-atlas.trameter.com), so we upload
          # straight to the user's root. The previous value
          # (/climate-atlas.trameter.com/) created a nested folder
          # that didn't serve.
          server-dir: ./
          protocol: ftps

name: Deploy to Namecheap

on:
  push:
    branches:
      - main
    paths:
      # Only deploy when published web assets actually change. Docs-only
      # commits (README, methodology, etc.) skip the round-trip.
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy web/ to Namecheap via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./web/
          # FTP_USERNAME is chrooted to the subdomain's document root
          # (/home/tramnqes/climate-atlas.trameter.com), so we upload
          # straight to the user's root. The previous value
          # (/climate-atlas.trameter.com/) created a nested folder
          # that didn't serve.
          server-dir: ./
          protocol: ftps
